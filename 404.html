<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // Redirect all 404s to index.html
        sessionStorage.redirect = window.location.pathname;
        window.location.replace('/');
    </script>
</head>
<body>
    <p>If you're not redirected automatically, <a href="/">click here</a>.</p>
</body>
</html>
